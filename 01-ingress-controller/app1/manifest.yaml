apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  # These labels are replicaset labels reference
  labels:
    project: roboshop
    tier: frontend
    component: app1
spec:
  replicas: 2
  selector:
  # Using these labels, replicaset selects the pod.
    matchLabels:
      project: roboshop
      tier: frontend
      component: app1
  # This is Pod definition, Pod is subset of replicaset
  template:
    metadata:
      # These MUST match the 'selector' labels specified above
      labels:
        project: roboshop
        tier: frontend
        component: app1
    spec:
      containers:
      - name: app1
        image: javeedmohd214/app1:1.0.0
---
# Service must be NodePort -- Old ALB ingress controller uses target-type: instance
# ALB registers EC2 nodes, traffic comes in on NodePort, then forwards to pod
apiVersion: v1
kind: Service
metadata:
  name: app1
spec:
  type: NodePort
  selector:
    # Labels are used as selectors.
    project: roboshop
    tier: frontend
    component: app1
  ports:
  - protocol: TCP
    port: 80        # Service Port
    targetPort: 80  # Container Port
---
# OLD ALB Ingress Controller (Before AWS Load Balancer Controller)
# Problems:
#   - target-type: instance → ALB → EC2 node (NodePort) → pod (extra hop)
#   - no group.name → every app gets its OWN ALB (expensive)
#   - v1beta1 API → removed in K8s 1.22
apiVersion: networking.k8s.io/v1beta1
kind: Ingress
metadata:
  name: app1
  annotations:
    kubernetes.io/ingress.class: "alb"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: instance
spec:
  rules:
  - host: "app1.devopsdaws.online"
    http:
      paths:
      - path: /
        backend:
          serviceName: app1
          servicePort: 80
